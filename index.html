<!DOCTYPE html>

<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rasidul ERP Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.hero{
background:linear-gradient(135deg,#2563eb,#7c3aed,#ec4899);
padding:25px;
border-radius:25px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.hero h1{
font-size:28px;
margin-bottom:10px;
}

.hero p{
opacity:.9;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
padding:20px;
border-radius:20px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.card h3{
font-size:14px;
margin-bottom:10px;
opacity:.8;
}

.card h2{
font-size:22px;
}

.section-title{
margin:20px 0 10px;
font-size:20px;
}

.modules{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:15px;
}

.module{
background:rgba(255,255,255,.08);
padding:25px;
border-radius:20px;
text-align:center;
cursor:pointer;
text-decoration:none;
color:white;
transition:.3s;
}

.module:hover{
transform:translateY(-5px);
}

.module span{
font-size:40px;
display:block;
margin-bottom:10px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111827;
display:flex;
justify-content:space-around;
padding:12px;
border-top:1px solid rgba(255,255,255,.1);
}

.bottom-nav a{
color:white;
text-decoration:none;
font-size:14px;
text-align:center;
}

</style>

</head>
<body>

<div class="hero">

<h1>💼 Rasidul Premium ERP</h1>

<p>
🟢 Cloud Connected <br>
📱 Last Device: Mobile
</p>

</div>

<div class="grid">

<div class="card">
<h3>💎 Working Capital</h3>
<h2 id="workingCapital">৳0</h2>
</div>

<div class="card">
<h3>📥 মোট পাওনা</h3>
<h2 id="totalReceivable">৳0</h2>
</div>

<div class="card">
<h3>📤 মোট দেনা</h3>
<h2 id="totalPayable">৳0</h2>
</div>

<div class="card">
<h3>⚖️ নেট ব্যালেন্স</h3>
<h2 id="netBalance">৳0</h2>
</div>

</div>

<h2 class="section-title">🚀 Quick Access</h2>

<div class="modules">

<a href="pages/opening.html" class="module">
<span>🌅</span>
Opening
</a>

<a href="pages/closing.html" class="module">
<span>🌙</span>
Closing
</a>

<a href="pages/capital.html" class="module">
<span>💎</span>
Capital
</a>

<a href="pages/ledger.html" class="module">
<span>👥</span>
Ledger
</a>

<a href="pages/reports.html" class="module">
<span>📊</span>
Reports
</a>

<a href="pages/backup.html" class="module">
<span>☁️</span>
Backup
</a>

<a href="pages/settings.html" class="module">
<span>⚙️</span>
Settings
</a>

</div>

<div class="bottom-nav">

<a href="#">🏠<br>Home</a>

<a href="pages/opening.html">
💰<br>Balance
</a>

<a href="pages/ledger.html">
👥<br>Ledger
</a>

<a href="pages/reports.html">
📊<br>Reports
</a>

<a href="pages/settings.html">
⚙️<br>More
</a>

</div>

</body>
</html>
