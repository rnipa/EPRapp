<!DOCTYPE html>

<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opening Balance</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
}

.back-btn{
text-decoration:none;
background:#2563eb;
color:white;
padding:10px 15px;
border-radius:10px;
}

.card{
background:rgba(255,255,255,.08);
padding:20px;
border-radius:20px;
backdrop-filter:blur(10px);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
margin-top:15px;
}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
}

.summary{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.box{
background:rgba(255,255,255,.08);
padding:15px;
border-radius:15px;
text-align:center;
}

button{
width:100%;
margin-top:20px;
padding:14px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}
</style>

</head>
<body>

<div class="header">
<a href="../index.html" class="back-btn">🏠 Dashboard</a>
<h2>🌅 Opening Balance</h2>
</div>

<div class="card">

<div class="grid">

<div>
<label>Bkash</label>
<input type="number" id="obk" value="0">
</div>

<div>
<label>Nagad</label>
<input type="number" id="ong" value="0">
</div>

<div>
<label>Rocket</label>
<input type="number" id="ork" value="0">
</div>

<div>
<label>MFS Cash</label>
<input type="number" id="omc" value="0">
</div>

<div>
<label>GP</label>
<input type="number" id="ogp" value="0">
</div>

<div>
<label>Robi</label>
<input type="number" id="orobi" value="0">
</div>

<div>
<label>Airtel</label>
<input type="number" id="oair" value="0">
</div>

<div>
<label>Banglalink</label>
<input type="number" id="obl" value="0">
</div>

<div>
<label>Tally Khata</label>
<input type="number" id="otk" value="0">
</div>

<div>
<label>Recharge Cash</label>
<input type="number" id="orc" value="0">
</div>

</div>

<div class="summary">

<div class="box">
<h3>💰 Opening E-Money</h3>
<h2 id="openingEmoney">0 ৳</h2>
</div>

<div class="box">
<h3>💵 Opening Cash</h3>
<h2 id="openingCash">0 ৳</h2>
</div>

</div>

<button onclick="saveOpening()">
💾 Save Opening Balance
</button>

</div>

<script src="../assets/js/core.js"></script>

<script>

function saveOpening(){

const data = {

obk: obk.value,
ong: ong.value,
ork: ork.value,
omc: omc.value,

ogp: ogp.value,
orobi: orobi.value,
oair: oair.value,
obl: obl.value,
otk: otk.value,
orc: orc.value

};

saveData('openingBalance', data);

alert('✅ Opening Balance Saved');

}

function loadOpening(){

const data = loadData('openingBalance', {});

for(const key in data){

const el = document.getElementById(key);

if(el){
el.value = data[key];
}

}

updateOpeningSummary();

}

function updateOpeningSummary(){

const emoney =

(Number(obk.value)||0)+
(Number(ong.value)||0)+
(Number(ork.value)||0)+
(Number(ogp.value)||0)+
(Number(orobi.value)||0)+
(Number(oair.value)||0)+
(Number(obl.value)||0)+
(Number(otk.value)||0);

const cash =

(Number(omc.value)||0)+
(Number(orc.value)||0);

document.getElementById('openingEmoney').innerHTML =
emoney.toLocaleString() + ' ৳';

document.getElementById('openingCash').innerHTML =
cash.toLocaleString() + ' ৳';

}

document.querySelectorAll('input').forEach(input=>{

input.addEventListener('input', updateOpeningSummary);

});

window.onload = function(){

loadOpening();

};

</script>

</body>
</html>
