<!DOCTYPE html>

<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Note Calculator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:#fff;
padding:20px;
}

.header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
}

.back-btn{
background:#2563eb;
color:white;
padding:10px 15px;
border-radius:10px;
text-decoration:none;
}

.card{
background:rgba(255,255,255,.08);
padding:20px;
border-radius:20px;
backdrop-filter:blur(10px);
max-width:800px;
margin:auto;
}

.row{
display:grid;
grid-template-columns:120px 1fr 120px;
gap:10px;
align-items:center;
margin-bottom:10px;
}

input{
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
width:100%;
}

.noteTotal{
text-align:right;
font-weight:bold;
}

.totalBox{
margin-top:20px;
padding:20px;
border-radius:15px;
background:#16a34a;
text-align:center;
font-size:28px;
font-weight:bold;
}

.btns{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:20px;
}

button{
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
color:white;
}

.opening{background:#2563eb;}
.closing{background:#ea580c;}
.mfs{background:#7c3aed;}
.recharge{background:#0891b2;}
</style>

</head>
<body>

<div class="header">
<a href="../index.html" class="back-btn">🏠 Dashboard</a>
<h2>💵 Cash Note Calculator</h2>
</div>

<div class="card">

<div class="row">
<div>৳1000</div>
<input type="number" id="n1000" value="0" oninput="calc()">
<div class="noteTotal" id="t1000">0</div>
</div>

<div class="row">
<div>৳500</div>
<input type="number" id="n500" value="0" oninput="calc()">
<div class="noteTotal" id="t500">0</div>
</div>

<div class="row">
<div>৳200</div>
<input type="number" id="n200" value="0" oninput="calc()">
<div class="noteTotal" id="t200">0</div>
</div>

<div class="row">
<div>৳100</div>
<input type="number" id="n100" value="0" oninput="calc()">
<div class="noteTotal" id="t100">0</div>
</div>

<div class="row">
<div>৳50</div>
<input type="number" id="n50" value="0" oninput="calc()">
<div class="noteTotal" id="t50">0</div>
</div>

<div class="row">
<div>৳20</div>
<input type="number" id="n20" value="0" oninput="calc()">
<div class="noteTotal" id="t20">0</div>
</div>

<div class="row">
<div>৳10</div>
<input type="number" id="n10" value="0" oninput="calc()">
<div class="noteTotal" id="t10">0</div>
</div>

<div class="row">
<div>৳5</div>
<input type="number" id="n5" value="0" oninput="calc()">
<div class="noteTotal" id="t5">0</div>
</div>

<div class="totalBox">
💰 Total Cash: <span id="grandTotal">0</span> ৳
</div>

<div class="btns">

<button class="opening" onclick="applyOpeningCash()">
🌅 Apply To Opening Cash
</button>

<button class="closing" onclick="applyClosingCash()">
🌙 Apply To Closing Cash
</button>

<button class="mfs" onclick="applyOpeningMFS()">
💳 Apply To Opening MFS
</button>

<button class="mfs" onclick="applyClosingMFS()">
💳 Apply To Closing MFS
</button>

<button class="recharge" onclick="applyOpeningRecharge()">
📱 Apply To Opening Recharge
</button>

<button class="recharge" onclick="applyClosingRecharge()">
📱 Apply To Closing Recharge
</button>

</div>

</div>

<script>

let totalCash=0;

function calc(){

const notes=[1000,500,200,100,50,20,10,5];
totalCash=0;

notes.forEach(v=>{

let qty=Number(document.getElementById('n'+v).value)||0;
let subtotal=qty*v;

document.getElementById('t'+v).innerHTML=
subtotal.toLocaleString();

totalCash+=subtotal;

});

document.getElementById('grandTotal').innerHTML=
totalCash.toLocaleString();

}

function applyOpeningCash(){
localStorage.setItem('cashCalcValue',totalCash);
alert('✅ Opening Cash Apply Ready');
}

function applyClosingCash(){
localStorage.setItem('cashCalcValue',totalCash);
alert('✅ Closing Cash Apply Ready');
}

function applyOpeningMFS(){
alert('✅ Opening MFS Apply Ready');
}

function applyClosingMFS(){
alert('✅ Closing MFS Apply Ready');
}

function applyOpeningRecharge(){
alert('✅ Opening Recharge Apply Ready');
}

function applyClosingRecharge(){
alert('✅ Closing Recharge Apply Ready');
}

calc();

</script>
  <script src="../assets/js/core.js"></script>

</body>
</html>
